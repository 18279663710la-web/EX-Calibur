# ============================================================
# CloudRAG-Hub Docker Compose
# 编排 2 个服务: frontend (Nginx) + backend (FastAPI BFF)
# ============================================================

services:

  # ---- FastAPI BFF 后端 (纯代理) ----
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cloudrag-backend
    restart: unless-stopped
    environment:
      APP_NAME: ${APP_NAME:-CloudRAG-Hub}
      APP_VERSION: ${APP_VERSION:-1.0.0}
      DEBUG: ${DEBUG:-false}
      HOST: 0.0.0.0
      PORT: 8080
      DIFY_BASE_URL: ${DIFY_BASE_URL:-http://docker-api-1:5001/v1}
      DIFY_API_KEY: ${DIFY_API_KEY:-}
      DIFY_TIMEOUT_SECONDS: ${DIFY_TIMEOUT_SECONDS:-120}
    networks:
      - docker_default

  # ---- Nginx + Svelte 前端 ----
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cloudrag-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-8081}:80"
    depends_on:
      - backend
    networks:
      - docker_default

# ---- 卷 ----
volumes:
  postgres_data:
    driver: local
    name: cloudrag_postgres_data
  uploads_data:
    driver: local
    name: cloudrag_uploads_data

# ---- 网络 ----
networks:
  cloudrag-net:
    driver: bridge
    name: cloudrag-net
  docker_default:
    external: true
    name: docker_default
