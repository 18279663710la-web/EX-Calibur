# ============================================================
# CloudRAG-Hub Docker Compose 一键部署
# 编排 4 个服务: frontend + backend + agent-server + postgres
# ============================================================

name: cloudrag-hub

services:

  # ---- PostgreSQL 数据库 ----
  postgres:
    image: postgres:15-alpine
    container_name: cloudrag-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cloudrag}
      POSTGRES_USER: ${POSTGRES_USER:-cloudrag}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cloudrag}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    ports:
      - "5433:5432"                      # 开发时可直连数据库（5432被Dify占用）
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cloudrag} -d ${POSTGRES_DB:-cloudrag}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - cloudrag-net

  # ---- FastAPI BFF 后端 ----
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cloudrag-backend
    restart: unless-stopped
    environment:
      # 服务
      APP_NAME: ${APP_NAME:-CloudRAG-Hub}
      APP_VERSION: ${APP_VERSION:-1.0.0}
      DEBUG: ${DEBUG:-false}
      HOST: 0.0.0.0
      PORT: 8080

      # JWT
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-in-production-to-random-64-chars}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_SECONDS: ${ACCESS_TOKEN_EXPIRE_SECONDS:-7200}
      REFRESH_TOKEN_EXPIRE_SECONDS: ${REFRESH_TOKEN_EXPIRE_SECONDS:-604800}

      # PostgreSQL (容器内服务名)
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-cloudrag}
      POSTGRES_USER: ${POSTGRES_USER:-cloudrag}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cloudrag}

      # Dify AI Platform (必须配置)
      DIFY_BASE_URL: ${DIFY_BASE_URL:-http://host.docker.internal/v1}
      DIFY_API_KEY: ${DIFY_API_KEY:-}
      DIFY_INTERNAL_KEY: ${DIFY_INTERNAL_KEY:-}
      DIFY_TIMEOUT_SECONDS: ${DIFY_TIMEOUT_SECONDS:-120}
      WEIXIN_BASE_URL: ${WEIXIN_BASE_URL:-https://ilinkai.weixin.qq.com}
      WEIXIN_CDN_BASE_URL: ${WEIXIN_CDN_BASE_URL:-https://novac2c.cdn.weixin.qq.com/c2c}
      WEIXIN_TOKEN: ${WEIXIN_TOKEN:-}
      WEIXIN_CREDENTIALS_PATH: /app/uploads/weixin_credentials.json

      # 上传
      MAX_UPLOAD_SIZE_MB: ${MAX_UPLOAD_SIZE_MB:-15}
      UPLOAD_DIR: /app/uploads
    volumes:
      - uploads_data:/app/uploads     # 文件持久化
    depends_on:
      postgres:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - cloudrag-net

  # ---- Agent 文件库服务 ----
  agent-server:
    build:
      context: .
      dockerfile: agent-server.Dockerfile
    container_name: cloudrag-agent-server
    restart: unless-stopped
    environment:
      AGENT_KNOWLEDGE_DIR: /app/knowledge
      AGENT_PORT: 8090
    volumes:
      - ./knowledge:/app/knowledge
    ports:
      - "${AGENT_PORT:-8090}:8090"
    networks:
      - cloudrag-net

  # ---- Nginx + Svelte 前端 ----
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cloudrag-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"       # 对外唯一入口
    depends_on:
      - backend
      - agent-server
    networks:
      - cloudrag-net

# ---- 卷 ----
volumes:
  postgres_data:
    driver: local
    name: cloudrag_postgres_data
  uploads_data:
    driver: local
    name: cloudrag_uploads_data

# ---- 网络 ----
networks:
  cloudrag-net:
    driver: bridge
    name: cloudrag-net
